name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  windows-mingw:
    name: Windows MinGW
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      # Pin: setup-msys2 v2.32.0 bumped the bundled msys2 base to 20260611, rolling
      # protobuf/abseil past the toolchain the fetched parser release artifacts were
      # built with (abseil lts_20250814) — breaks the link against them. Unpin once
      # the artifacts are rebuilt on a current toolchain (see workspace BACKLOG).
      - uses: msys2/setup-msys2@v2.31.1
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-protobuf
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-declarative

      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -G Ninja

      - name: Build
        run: cmake --build build

  linux:
    name: Linux x86_64
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtshadertools'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build protobuf-compiler libprotobuf-dev libabsl-dev \
            libgl1-mesa-dev libxkbcommon-dev

      - name: Configure
        run: cmake -B build -G Ninja

      - name: Build
        run: cmake --build build

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows-mingw:
    name: Windows MinGW
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-protobuf
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-declarative
            p7zip

      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p dist
          PREFIX="${MINGW_PREFIX}"

          # Application binaries.
          cp build/automotive-format-explorer.exe dist/
          cp build/explorer-core.dll dist/
          cp build/explorer-a2l-backend.dll dist/
          cp build/explorer-dbc-backend.dll dist/
          cp build/explorer-ldf-backend.dll dist/

          # MinGW runtime DLLs.
          for dll in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll zlib1.dll \
                     libprotobuf.dll libutf8_validity.dll libutf8_range.dll \
                     libdouble-conversion.dll libb2-1.dll libpcre2-16-0.dll \
                     libharfbuzz-0.dll libpng16-16.dll libfreetype-6.dll \
                     libbz2-1.dll libbrotlidec.dll libbrotlicommon.dll \
                     libintl-8.dll libiconv-2.dll libglib-2.0-0.dll libgraphite2.dll \
                     libmd4c.dll libicuin76.dll libicuuc76.dll libicudt76.dll; do
            cp "${PREFIX}/bin/${dll}" dist/ 2>/dev/null || true
          done
          # Abseil DLLs (versioned).
          cp ${PREFIX}/bin/libabsl_*.dll dist/ 2>/dev/null || true

          # Qt6 core DLLs.
          for dll in Qt6Core.dll Qt6Gui.dll Qt6Network.dll Qt6OpenGL.dll \
                     Qt6Qml.dll Qt6QmlModels.dll Qt6QmlWorkerScript.dll \
                     Qt6Quick.dll Qt6QuickControls2.dll Qt6QuickControls2Impl.dll \
                     Qt6QuickDialogs2.dll Qt6QuickDialogs2QuickImpl.dll Qt6QuickDialogs2Utils.dll \
                     Qt6QuickLayouts.dll Qt6QuickTemplates2.dll \
                     Qt6Concurrent.dll Qt6Widgets.dll; do
            cp "${PREFIX}/bin/${dll}" dist/ 2>/dev/null || true
          done

          # Qt6 platform plugins.
          mkdir -p dist/platforms
          cp "${PREFIX}/share/qt6/plugins/platforms/qwindows.dll" dist/platforms/

          # Qt6 style plugins.
          mkdir -p dist/styles
          cp "${PREFIX}/share/qt6/plugins/styles/"*.dll dist/styles/ 2>/dev/null || true

          # Qt6 image format plugins.
          mkdir -p dist/imageformats
          cp "${PREFIX}/share/qt6/plugins/imageformats/"*.dll dist/imageformats/ 2>/dev/null || true

          # Qt6 TLS plugins (for network if needed).
          mkdir -p dist/tls
          cp "${PREFIX}/share/qt6/plugins/tls/"*.dll dist/tls/ 2>/dev/null || true

          # Qt6 QML modules — copy the ones we actually import.
          mkdir -p dist/qml
          for mod in QtQuick QtQml Qt QtQuick/Controls QtQuick/Layouts \
                     QtQuick/Templates QtQuick/Dialogs QtQuick/Window; do
            if [ -d "${PREFIX}/share/qt6/qml/${mod}" ]; then
              mkdir -p "dist/qml/${mod}"
              cp -r "${PREFIX}/share/qt6/qml/${mod}/"* "dist/qml/${mod}/" 2>/dev/null || true
            fi
          done

      - name: Create archive
        run: |
          VERSION=${GITHUB_REF_NAME}
          cd dist
          7z a -tzip "../automotive-format-explorer-${VERSION}-windows-x64.zip" .

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: automotive-format-explorer-*.zip
          generate_release_notes: true
